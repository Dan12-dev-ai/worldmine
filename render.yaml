services:
  # Main API Service - Production Optimized
  - type: web
    name: worldmine-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    healthCheckTimeout: 30
    autoDeploy: true
    envVars:
      # Core Environment
      - key: PYTHON_VERSION
        value: 3.11
      - key: FASTAPI_ENV
        value: production
      - key: PROD_URL
        sync: false
      - key: PORT
        value: 8000
      
      # Database Configuration (Secure)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_TYPE
        value: sqlite
      
      # Redis Configuration (Secure)
      - key: REDIS_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        sync: false
      
      # Global Optimization
      - key: WORLDWIDE_OPTIMIZATION
        value: enabled
      - key: EDGE_COMPUTING
        value: enabled
      - key: LATENCY_TARGET
        value: 0.1ms
      - key: GLOBAL_REPLICATION
        value: enabled
      
      # Security Configuration
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      
      # API Configuration
      - key: API_VERSION
        value: v1
      - key: API_RATE_LIMIT
        value: 1000
      - key: API_TIMEOUT
        value: 30
      
      # Swarm Configuration
      - key: SWARM_MODE
        value: production
      - key: SWARM_API_KEY
        sync: false
      - key: SWARM_WEBHOOK_SECRET
        sync: false
      
      # Payment Configuration
      - key: PAYMENT_HUB_ENABLED
        value: true
      - key: PAYMENT_API_KEY
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      
      # Telegram Configuration
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      
      # External API Keys (Secure)
      - key: OPENAI_API_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: UPWORK_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      
      # Currency Exchange APIs
      - key: FIXER_API_KEY
        sync: false
      - key: EXCHANGERATE_API_KEY
        sync: false
      - key: CURRENCYAPI_KEY
        sync: false
      
      # Monitoring & Analytics
      - key: SENTRY_DSN
        sync: false
      - key: GOOGLE_ANALYTICS_ID
        sync: false
      - key: MIXPANEL_TOKEN
        sync: false
    regions:
      # Global Edge Regions for 0.1ms latency
      - oregon        # USA West Coast (New York, Chicago)
      - frankfurt     # Europe (London, Paris, Berlin)
      - singapore     # Asia (Tokyo, Seoul, Mumbai)
      - mumbai       # India (Addis Ababa, Nairobi)
      - sao-paulo    # South America (São Paulo, Buenos Aires)
    scaling:
      minInstances: 1
      maxInstances: 10
      targetCPUPercent: 70
      targetMemoryPercent: 80
    headers:
      - name: X-Edge-Location
        value: enabled
      - name: X-Latency-Target
        value: 0.1ms
      - name: X-Global-Optimization
        value: true
      - name: X-Cache-Control
        value: edge-cache, max-age=300
      - name: X-CDN-Optimization
        value: cloudflare, fastly

  # Swarm API Service - Production Optimized
  - type: web
    name: worldmine-swarm
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.swarm_api:swarm_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/swarm/status
    autoDeploy: true
    envVars:
      # Core Environment
      - key: PYTHON_VERSION
        value: 3.11
      - key: SWARM_MODE
        value: production
      - key: PROD_URL
        sync: false
      - key: PORT
        value: 8001
      
      # Swarm Configuration
      - key: GLOBAL_DOMINATION
        value: enabled
      - key: EDGE_COMPUTING
        value: enabled
      - key: LATENCY_TARGET
        value: 0.1ms
      - key: GLOBAL_REACH
        value: 256-countries
      
      # Security Configuration
      - key: SWARM_API_KEY
        sync: false
      - key: SWARM_WEBHOOK_SECRET
        sync: false
      - key: SWARM_JWT_SECRET
        sync: false
      
      # Database Configuration
      - key: DATABASE_URL
        sync: false
      - key: SWARM_DB_PATH
        value: ./global_reach.db
      
      # External Services
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: UPWORK_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      
      # Monitoring
      - key: SENTRY_DSN
        sync: false
      - key: SWARM_METRICS_ENABLED
        value: true
    regions:
      # Global Edge Regions for Swarm Operations
      - oregon        # USA West Coast
      - frankfurt     # Europe
      - singapore     # Asia
      - mumbai       # India/Africa
      - sao-paulo    # South America
    scaling:
      minInstances: 1
      maxInstances: 5
      targetCPUPercent: 60
      targetMemoryPercent: 70
    headers:
      - name: X-Swarm-Optimization
        value: enabled
      - name: X-Latency-Target
        value: 0.1ms
      - name: X-Global-Reach
        value: 256-countries

  # Payment Hub Service - Production Optimized
  - type: web
    name: worldmine-payments
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.payment_api:payment_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/payments/health
    autoDeploy: true
    envVars:
      # Core Environment
      - key: PYTHON_VERSION
        value: 3.11
      - key: PAYMENT_HUB
        value: production
      - key: PROD_URL
        sync: false
      - key: PORT
        value: 8002
      
      # Payment Configuration
      - key: GLOBAL_CURRENCIES
        value: 256-countries
      - key: EDGE_COMPUTING
        value: enabled
      - key: LATENCY_TARGET
        value: 0.1ms
      - key: PAYMENT_PROCESSING_ENABLED
        value: true
      
      # Security Configuration
      - key: PAYMENT_API_KEY
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: PAYMENT_JWT_SECRET
        sync: false
      - key: PAYMENT_ENCRYPTION_KEY
        sync: false
      
      # Database Configuration
      - key: DATABASE_URL
        sync: false
      - key: PAYMENT_DB_PATH
        value: ./payment_hub.db
      
      # Currency Exchange APIs
      - key: FIXER_API_KEY
        sync: false
      - key: EXCHANGERATE_API_KEY
        sync: false
      - key: CURRENCYAPI_KEY
        sync: false
      - key: OPENEXCHANGE_API_KEY
        sync: false
      
      # Payment Processor APIs
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: COINBASE_WEBHOOK_SECRET
        sync: false
      
      # Compliance & Security
      - key: KYC_API_KEY
        sync: false
      - key: AML_API_KEY
        sync: false
      - key: FRAUD_DETECTION_KEY
        sync: false
      
      # Monitoring
      - key: SENTRY_DSN
        sync: false
      - key: PAYMENT_METRICS_ENABLED
        value: true
    regions:
      # Global Edge Regions for Payment Processing
      - oregon        # USA West Coast
      - frankfurt     # Europe
      - singapore     # Asia
      - mumbai       # India/Africa
      - sao-paulo    # South America
    scaling:
      minInstances: 1
      maxInstances: 8
      targetCPUPercent: 65
      targetMemoryPercent: 75
    headers:
      - name: X-Payment-Optimization
        value: enabled
      - name: X-Latency-Target
        value: 0.1ms
      - name: X-Currency-Conversion
        value: real-time
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: CHAPA_PUBLIC_KEY
        value: ${CHAPA_PUBLIC_KEY}
      - key: CHAPA_SECRET_KEY
        value: ${CHAPA_SECRET_KEY}
      - key: PAYONEER_CLIENT_ID
        value: ${PAYONEER_CLIENT_ID}
      - key: PAYONEER_CLIENT_SECRET
        value: ${PAYONEER_CLIENT_SECRET}
      - key: GROQ_API_KEY
        value: ${GROQ_API_KEY}
      - key: BINANCE_API_KEY
        value: ${BINANCE_API_KEY}
      - key: BINANCE_SECRET_KEY
        value: ${BINANCE_SECRET_KEY}
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: ENCRYPTION_KEY
        value: ${ENCRYPTION_KEY}

  # Payout Orchestrator
  - type: web
    name: dedan-mine-payout
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn payout.api:app --bind 0.0.0.0 --port $PORT
    healthCheckPath: /health
    healthCheckTimeout: 30
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: NODE_ENV
        value: production
      - key: CHAPA_PUBLIC_KEY
        value: ${CHAPA_PUBLIC_KEY}
      - key: CHAPA_SECRET_KEY
        value: ${CHAPA_SECRET_KEY}
      - key: PAYONEER_CLIENT_ID
        value: ${PAYONEER_CLIENT_ID}
      - key: PAYONEER_CLIENT_SECRET
        value: ${PAYONEER_CLIENT_SECRET}
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: ENCRYPTION_KEY
        value: ${ENCRYPTION_KEY}

  # Mobile Dashboard
  - type: web
    name: dedan-mine-dashboard
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && streamlit run dashboard/app.py --server.port=$PORT --server.address=0.0.0.0
    healthCheckPath: /_stcore/health
    healthCheckTimeout: 30
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: NODE_ENV
        value: production
      - key: STREAMLIT_SERVER_PORT
        value: $PORT
      - key: STREAMLIT_SERVER_ADDRESS
        value: 0.0.0.0

  # Frontend
  - type: web
    name: dedan-mine-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: serve -s build -l $PORT
    healthCheckPath: /
    healthCheckTimeout: 30
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: ${REACT_APP_API_URL}
      - key: REACT_APP_PAYOUT_URL
        value: ${REACT_APP_PAYOUT_URL}
      - key: REACT_APP_DASHBOARD_URL
        value: ${REACT_APP_DASHBOARD_URL}

version: "1.0.0"

# Render Configuration with Cloudflare Zero Trust Headers
httpHeaders:
  - name: X-Frame-Options
    value: DENY
  - name: X-Content-Type-Options
    value: nosniff
  - name: Referrer-Policy
    value: strict-origin-when-cross-origin
  - name: X-XSS-Protection
    value: "1; mode=block"
  - name: Strict-Transport-Security
    value: "max-age=31536000; includeSubDomains"
  - name: Content-Security-Policy
    value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://render.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:; frame-ancestors 'none';"
  - name: Cloudflare-IP-Country
    value: ET
  - name: X-NBE-Compliance
    value: v1.0
  - name: X-Quantum-Security
    value: CRYSTALS-Kyber-1024

# Service Dependencies
databases:
  - name: dedan-mine-db
    databaseName: dedan_mine
    user: ${DB_USER}
    password: ${DB_PASSWORD}

# Environment Groups
environmentGroups:
  - name: production
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11
      - key: NODE_VERSION
        value: 18

# Build Configuration
build:
  - type: python
    version: 3.11
  - type: node
    version: 18

# Scaling Configuration
scaling:
  - type: web
    name: dedan-mine-backend
    autoDeploy: true
    plan: starter
  - type: web
    name: dedan-mine-payout
    autoDeploy: true
    plan: starter
  - type: web
    name: dedan-mine-dashboard
    autoDeploy: true
    plan: starter
  - type: web
    name: dedan-mine-frontend
    autoDeploy: true
    plan: starter

# Health Checks
healthChecks:
  - type: web
    name: dedan-mine-backend
    path: /health
    interval: 30
    timeout: 10
    gracePeriod: 5
  - type: web
    name: dedan-mine-payout
    path: /health
    interval: 30
    timeout: 10
    gracePeriod: 5
  - type: web
    name: dedan-mine-dashboard
    path: /_stcore/health
    interval: 30
    timeout: 10
    gracePeriod: 5
  - type: web
    name: dedan-mine-frontend
    path: /
    interval: 30
    timeout: 10
    gracePeriod: 5
