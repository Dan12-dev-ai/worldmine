name: 🚀 Worldmine CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io

jobs:
  # 🔍 Code Quality & Security
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 ESLint Analysis
        run: |
          npm run lint
          echo "::set-output name=lint-result::$(npm run lint 2>&1 | grep -E 'error|warning' | wc -l || echo '0')"

      - name: 🔒 Security Audit
        run: |
          npm audit --audit-level=moderate
          echo "::set-output name=security-issues::$(npm audit --json | jq '.vulnerabilities | length' || echo '0')"

      - name: 📊 Code Coverage
        run: |
          npm run test:coverage
          echo "::set-output name=coverage::$(cat coverage/coverage-summary.json | jq '.total.lines.pct' || echo '0')"

      - name: 📈 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectKey: worldmine
          organization: worldmine-org

  # 🧪 Testing Suite
  test-suite:
    runs-on: ubuntu-latest
    needs: quality-check
    strategy:
      matrix:
        node-version: [16, 18, 20]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Unit Tests
        run: npm run test:unit

      - name: 🧪 Integration Tests
        run: npm run test:integration

      - name: 🧪 E2E Tests
        run: npm run test:e2e

      - name: 📊 Accessibility Tests
        run: npm run test:a11y

      - name: ⚡ Performance Tests
        run: npm run test:performance

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            test-results/
            coverage/
            lighthouse-reports/

  # 🏗️ Build & Security
  build-and-scan:
    runs-on: ubuntu-latest
    needs: test-suite
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Application
        run: |
          npm run build
          echo "Build completed successfully"

      - name: 🔍 OWASP ZAP Security Scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-J'

      - name: 🔍 SAST Code Analysis
        uses: github/super-linter@v4
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build-reports/
            security-reports/

  # 🐳 Docker Build & Push
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/worldmine
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).createdAt }}
            VCS_REF=${{ github.ref }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).version }}

      - name: 🏷️ Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/worldmine:${{ fromJSON(steps.meta.outputs.json).version }}

  # 🚀 Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Vercel Staging
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: 🧪 Run Smoke Tests
        run: |
          npm run test:smoke -- --baseUrl=https://staging.worldmine.vercel.app
          echo "Smoke tests completed for staging"

      - name: 📊 Performance Monitoring
        run: |
          npm run test:performance -- --baseUrl=https://staging.worldmine.vercel.app
          echo "Performance tests completed for staging"

  # 🚀 Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: 🧪 Run Smoke Tests
        run: |
          npm run test:smoke -- --baseUrl=https://worldmine.vercel.app
          echo "Smoke tests completed for production"

      - name: 📊 Performance Monitoring
        run: |
          npm run test:performance -- --baseUrl=https://worldmine.vercel.app
          echo "Performance tests completed for production"

      - name: 📧 Deploy Database Migrations
        run: |
          npx supabase db push --db-url=${{ secrets.SUPABASE_DB_URL }}
          echo "Database migrations deployed"

      - name: 🔄 Update Environment Variables
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "VITE_SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
              "VITE_SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
              "VITE_ADMIN_USER_ID": "${{ secrets.ADMIN_USER_ID }}",
              "VITE_AUTH_SECRET": "${{ secrets.AUTH_SECRET }}"
            }' \
            https://api.vercel.com/v1/projects/${{ secrets.VERCEL_PROJECT_ID }}/env

  # 🔍 Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🔍 Dependency Check
        run: |
          npm audit --json > audit-results.json
          echo "Dependency audit completed"

      - name: 📤 Upload Audit Results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: audit-results.json

  # 📊 Monitoring & Observability
  monitoring-setup:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📊 Setup Monitoring
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DATADOG_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "worldmine-production",
              "type": "web",
              "url": "https://worldmine.vercel.app",
              "config": {
                "apm": {
                  "enabled": true,
                  "sample_rate": 0.1
                },
                "rum": {
                  "enabled": true,
                  "sample_rate": 0.1
                },
                "logs": {
                  "enabled": true,
                  "level": "info"
                }
              }
            }' \
            https://api.datadoghq.com/api/v1/monitor

      - name: 📊 Setup Error Tracking
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "worldmine-production",
              "organization": "worldmine",
              "project": "worldmine",
              "platform": "javascript",
              "environment": "production",
              "url": "https://worldmine.vercel.app"
            }' \
            https://sentry.io/api/0/projects/

      - name: 📊 Setup Health Checks
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HEALTHCHECKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "worldmine-health-check",
              "url": "https://worldmine.vercel.app/api/health",
              "interval": 60,
              "grace": 300,
              "channels": ["email", "slack"],
              "notifications": {
                "email": "devops@worldmine.com",
                "slack": "${{ secrets.SLACK_WEBHOOK_URL }}"
              }
            }' \
            https://healthchecks.io/api/v1/checks/

  # 📈 Performance Testing
  performance-test:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Load Testing
        run: |
          npm install -g k6
          k6 run --out json=results.json performance/k6-load-test.js
          echo "Load testing completed"

      - name: 📤 Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: results.json

  # 🧪 E2E Testing
  e2e-test:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        device: [desktop, mobile, tablet]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Install Playwright
        run: npx playwright install --with-deps

      - name: 🧪 Run E2E Tests
        run: |
          npx playwright test \
            --project=chromium \
            --device=${{ matrix.device }} \
            --reporter=json \
            --reporter=html \
            --output-dir=test-results

      - name: 📤 Upload E2E Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}-${{ matrix.device }}
          path: |
            test-results/
            playwright-report/

  # 📋 Notification
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production, monitoring-setup]
    if: always()
    steps:
      - name: 📧 Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: |
            🚀 Worldmine Deployment Status
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Status: ${{ job.status }}
            Deploy URL: https://worldmine.vercel.app
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 📧 Notify Email
        if: needs.deploy-production.result == 'success'
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "to": ["devops@worldmine.com", "stakeholders@worldmine.com"],
              "subject": "🚀 Worldmine Deployment Successful",
              "body": "Worldmine has been successfully deployed to production.\n\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nDeploy URL: https://worldmine.vercel.app",
              "html": "<h2>🚀 Worldmine Deployment Successful</h2><p>Worldmine has been successfully deployed to production.</p><ul><li><strong>Branch:</strong> ${{ github.ref }}</li><li><strong>Commit:</strong> ${{ github.sha }}</li><li><strong>Deploy URL:</strong> <a href=\"https://worldmine.vercel.app\">https://worldmine.vercel.app</a></li></ul>"
            }' \
            ${{ secrets.EMAIL_SERVICE_URL }}

      - name: 📧 Notify on Failure
        if: failure()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "to": ["devops@worldmine.com", "alerts@worldmine.com"],
              "subject": "❌ Worldmine Deployment Failed",
              "body": "Worldmine deployment failed. Please investigate immediately.\n\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nWorkflow: ${{ github.workflow }}\nRun ID: ${{ github.run_id }}",
              "html": "<h2>❌ Worldmine Deployment Failed</h2><p>Worldmine deployment failed. Please investigate immediately.</p><ul><li><strong>Branch:</strong> ${{ github.ref }}</li><li><strong>Commit:</strong> ${{ github.sha }}</li><li><strong>Workflow:</strong> ${{ github.workflow }}</li><li><strong>Run ID:</strong> ${{ github.run_id }}</li></ul><p><a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Workflow Logs</a></p>"
            }' \
            ${{ secrets.EMAIL_SERVICE_URL }}
